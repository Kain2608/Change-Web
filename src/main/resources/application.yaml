server:
  port: 8081
spring:
  jmx:
    enabled: false   
  datasource:
    url: jdbc:mysql://localhost:3306/sport
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  sql:
    init:
      mode: never